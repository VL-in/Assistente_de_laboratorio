# AbRank — benchmark de afinidade anticorpo–antígeno (Kaggle)
# Paper: https://arxiv.org/html/2506.17857v2
# Dataset: https://www.kaggle.com/datasets/aurlienplissier/abrank

dataset_id: abrank_kaggle
display_name: "AbRank (Kaggle) — afinidade Ab–Ag"
kaggle_handle: aurlienplissier/abrank
# Dataset completo no Kaggle (TSV, ~28 colunas, inclui sequências e clusters).
# O split ``Benchmarks/train_regression.csv`` é um subconjunto (~16 colunas, sem sequências).
kaggle_split_file: AbRank_dataset.csv
csv_separator: "\t"

ml_task: regression
default_target: log_Aff
default_metric: r2

# Identificadores e textos longos — nunca como feature
suggested_drop:
  - Ab_name
  - Ag_name
  - Ag_name_details
  - Source
  - Aff_op
  - Ab_PDB_ID
  - Ag_PDB_ID
  - bound_AbAg_PDB_ID
  - Ab_heavy_chain_seq
  - Ab_light_chain_seq
  - Ag_seq

feature_hints:
  numeric:
    - "IC50 [ug/mL]"
    - "Affinity_Kd [nM]"
    - escape
    - "log(Kd_ratio)"
    - Ag_epitope_restrictions
    - Ab_Lev3_cluster
    - Ab10_cluster
    - Ab25_cluster
    - Ab50_cluster
    - Ag_Lev3_cluster
    - Ag10_cluster
    - Ag25_cluster
    - Ag50_cluster
  categorical:
    - Ab_structure_method
    - Ag_structure_method
    - bound_AbAg_structure_method

columns:
  - name: Ab_name
    role: identifier
    dtype: text
    description: Identificador do anticorpo no benchmark AbRank.
    ml_use: identifier

  - name: Ag_name
    role: identifier
    dtype: text
    description: Identificador do antígeno associado ao par Ab–Ag.
    ml_use: identifier

  - name: Ag_name_details
    role: metadata
    dtype: text
    description: Descrição textual do antígeno (epítopo, proteína, etc.).
    ml_use: exclude

  - name: "IC50 [ug/mL]"
    role: assay_readout
    dtype: float
    description: IC50 em µg/mL quando disponível na fonte original.
    ml_use: optional_feature
    notes: Muitos valores ausentes — o pipeline usa imputação mediana.

  - name: "Affinity_Kd [nM]"
    role: assay_readout
    dtype: float
    description: Constante de dissociação Kd em nM.
    ml_use: optional_feature

  - name: Ag_epitope_restrictions
    role: covariate
    dtype: float
    description: Restrições de epítopo codificadas na base original.
    ml_use: optional_feature

  - name: Ab_heavy_chain_seq
    role: sequence
    dtype: text
    description: Sequência da cadeia pesada do anticorpo (texto longo).
    ml_use: sequence

  - name: Ab_light_chain_seq
    role: sequence
    dtype: text
    description: Sequência da cadeia leve do anticorpo (texto longo).
    ml_use: sequence

  - name: Ag_seq
    role: sequence
    dtype: text
    description: Sequência do antígeno (texto longo).
    ml_use: sequence

  - name: Ab_structure_method
    role: metadata
    dtype: category
    description: Método experimental ou predito da estrutura do anticorpo.
    ml_use: optional_feature

  - name: Ag_structure_method
    role: metadata
    dtype: category
    description: Método da estrutura do antígeno.
    ml_use: optional_feature

  - name: bound_AbAg_structure_method
    role: metadata
    dtype: category
    description: Método da estrutura do complexo Ab–Ag ligado.
    ml_use: optional_feature

  - name: Ab_PDB_ID
    role: identifier
    dtype: text
    description: Identificador PDB do anticorpo.
    ml_use: exclude

  - name: Ag_PDB_ID
    role: identifier
    dtype: text
    description: Identificador PDB do antígeno.
    ml_use: exclude

  - name: bound_AbAg_PDB_ID
    role: identifier
    dtype: text
    description: Identificador PDB do complexo Ab–Ag.
    ml_use: exclude

  - name: Ab_Lev3_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do anticorpo (nível Lev3).
    ml_use: feature

  - name: Source
    role: metadata
    dtype: text
    description: Base de dados de origem do registro (SKEMPI, SAbDab, etc.).
    ml_use: exclude

  - name: escape
    role: covariate
    dtype: float
    description: Indicador relacionado a mutações de escape (quando aplicável).
    ml_use: optional_feature

  - name: "log(Kd_ratio)"
    role: derived
    dtype: float
    description: Logaritmo da razão de Kd em ensaios comparativos.
    ml_use: optional_feature

  - name: Ab10_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do anticorpo (10% identidade).
    ml_use: feature

  - name: Ab25_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do anticorpo (25% identidade).
    ml_use: feature

  - name: Ab50_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do anticorpo (50% identidade).
    ml_use: feature

  - name: Ag_Lev3_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do antígeno (nível Lev3).
    ml_use: feature

  - name: Ag10_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do antígeno (10% identidade).
    ml_use: feature

  - name: Ag25_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do antígeno (25% identidade).
    ml_use: feature

  - name: Ag50_cluster
    role: cluster
    dtype: int
    description: Cluster de sequência do antígeno (50% identidade).
    ml_use: feature

  - name: log_Aff
    role: target
    dtype: float
    description: >
      Log da afinidade (alvo principal para regressão).
      Valores maiores indicam maior afinidade de ligação.
    ml_use: target

  - name: Aff_op
    role: auxiliary
    dtype: category
    description: Operador de comparação de afinidade (=, >, <) em registros pareados.
    ml_use: exclude
