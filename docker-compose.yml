# MVP: aplicação Streamlit roda só dentro deste contêiner.
# Dados locais (Projetos) entram por volume; o LLM agora é remoto (OpenRouter).

services:
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: assistente-lab-streamlit
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8502}:8502"
    environment:
      PYTHONUNBUFFERED: "1"
      ASSISTENTE_PROJETOS_DIR: /data/projetos
      ASSISTENTE_TXTAI_DIR: /data/txtai
      ASSISTENTE_DUCKDB_DIR: /data/duckdb
      ASSISTENTE_ML_DIR: /data/ml
      ASSISTENTE_ML_CHAT_MODEL: ${ASSISTENTE_ML_CHAT_MODEL:-/data/ml/modelo_20260524_224734_04768.pkl}
      HF_HOME: /data/ml/huggingface
      TRANSFORMERS_CACHE: /data/ml/huggingface
      KAGGLEHUB_CACHE: /data/ml/kagglehub
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
      # ── LLM remoto (OpenRouter, API compatível com OpenAI) ──
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openrouter/auto}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Assistente de Lab}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      # OPENAI_API_KEY fica como fallback caso alguma lib filha (CrewAI/LiteLLM)
      # exija a variável padrão da OpenAI; em geral é a mesma chave do OpenRouter.
      OPENAI_API_KEY: ${OPENROUTER_API_KEY:-${OPENAI_API_KEY:-}}
      # Observabilidade LLM (Langfuse) — opcional; ver .env.docker.example
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      LANGFUSE_TRACING_ENVIRONMENT: ${LANGFUSE_TRACING_ENVIRONMENT:-development}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-}
      LANGFUSE_TAGS: ${LANGFUSE_TAGS:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-1}
    volumes:
      # Pasta do host com um subdiretório por projeto de P&D (somente leitura)
      - type: bind
        source: ${PROJETOS_HOST_DIR:-./projetos}
        target: /data/projetos
        read_only: true
      - assistente_txtai:/data/txtai
      - assistente_duckdb:/data/duckdb
      - assistente_ml:/data/ml
      - assistente_sqlite:/data/sqlite

volumes:
  assistente_txtai:
  assistente_duckdb:
  assistente_ml:
  assistente_sqlite:
